    <section class="page-header">
        <h1>SPORTS</h1>
        <p>Action & Sports Photography</p>
    </section>
    <section class="grid" id="portfolio-grid"></section>
    <footer><p>© KUSHAL DOSHI - MEMORY WHEEL</p></footer>
    <script>
        const projects = [
            {image:"https://images.unsplash.com/photo-1461896836934-ffe607ba8211",title:"Running Action",category:"Athletics",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1517649763962-0c623066013b",title:"Basketball Game",category:"Basketball",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1579952363873-27f3bade9f55",title:"Football Match",category:"Football",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1551958219-acbc608c6377",title:"Cricket Action",category:"Cricket",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1530543787849-128d94430c6b",title:"Cycling Race",category:"Cycling",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1571902943202-507ec2618e8f",title:"Gym Training",category:"Fitness",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1546519638-68e109498ffc",title:"Athlete Portrait",category:"Portrait",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1519311965067-36d3e5f33d39",title:"Sports Model",category:"Portrait",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1434682881908-b43d0467b798",title:"Runner Profile",category:"Athletics",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1517836357463-d25dfeac3438",title:"Fitness Portrait",category:"Fitness",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1606103836293-0a063a6e7999",title:"Sports Equipment",category:"Equipment",orientation:"square"},
            {image:"https://images.unsplash.com/photo-1587280501635-68a0e82cd5ff",title:"Tennis Ball",category:"Equipment",orientation:"square"},
        ];
        const grid=document.getElementById('portfolio-grid');
        projects.forEach((project,index)=>{
            const card=document.createElement('div');
            card.className=`card ${project.orientation}`;
            card.style.transitionDelay=`${(index%4)*0.1}s`;
            card.innerHTML=`<img src="${project.image}" alt="${project.title}" loading="lazy"><div class="overlay"><h3>${project.title}</h3><p>— view —</p></div>`;
            grid.appendChild(card);
        });
        const observer=new IntersectionObserver((entries)=>{entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('visible');observer.unobserve(entry.target);}});},{threshold:0.1,rootMargin:'0px'});
        document.querySelectorAll('.card').forEach(card=>observer.observe(card));
        // Mobile menu
        const hamburger=document.querySelector('.hamburger');
        const navLinks=document.querySelector('.nav-links');
        if(hamburger){hamburger.addEventListener('click',()=>{hamburger.classList.toggle('active');navLinks.classList.toggle('active');});document.querySelectorAll('.nav-links a').forEach(link=>{link.addEventListener('click',()=>{hamburger.classList.remove('active');navLinks.classList.remove('active');});});}
    </script>
</body>
</html>
