    <section class="page-header">
        <h1>CELEBRITY</h1>
        <p>Celebrity Portraits & Events</p>
    </section>
    <section class="grid" id="portfolio-grid"></section>
    <footer><p>© KUSHAL DOSHI - MEMORY WHEEL</p></footer>
    <script>
        const projects = [
            {image:"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d",title:"Celebrity Portrait",category:"Portrait",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1506794778202-cad84cf45f1d",title:"Actor Headshot",category:"Headshot",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1531746020798-e6953c6e8e04",title:"Magazine Shoot",category:"Editorial",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1517841905240-472988babdf9",title:"Celebrity Glamour",category:"Glamour",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1502767089025-6572583495f9",title:"Red Carpet",category:"Event",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1534528741775-53994a69daeb",title:"Star Portrait",category:"Portrait",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e",title:"Fashion Icon",category:"Fashion",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1492684223066-81342ee5ff30",title:"Award Show",category:"Event",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1511795409834-ef04bbd61622",title:"Concert Performance",category:"Performance",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1533929736458-ca588d08c8be",title:"Celebrity Event",category:"Event",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1514525253161-7a46d19cd819",title:"VIP Party",category:"Event",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1540039155733-5bb30b53aa14",title:"Star Close-up",category:"Portrait",orientation:"square"},
        ];
        const grid=document.getElementById('portfolio-grid');
        projects.forEach((project,index)=>{
            const card=document.createElement('div');
            card.className=`card ${project.orientation}`;
            card.style.transitionDelay=`${(index%4)*0.1}s`;
            card.innerHTML=`<img src="${project.image}" alt="${project.title}" loading="lazy"><div class="overlay"><h3>${project.title}</h3><p>— view —</p></div>`;
            grid.appendChild(card);
        });
        const observer=new IntersectionObserver((entries)=>{entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('visible');observer.unobserve(entry.target);}});},{threshold:0.1,rootMargin:'0px'});
        document.querySelectorAll('.card').forEach(card=>observer.observe(card));
        // Mobile menu
        const hamburger=document.querySelector('.hamburger');
        const navLinks=document.querySelector('.nav-links');
        if(hamburger){hamburger.addEventListener('click',()=>{hamburger.classList.toggle('active');navLinks.classList.toggle('active');});document.querySelectorAll('.nav-links a').forEach(link=>{link.addEventListener('click',()=>{hamburger.classList.remove('active');navLinks.classList.remove('active');});});}
    </script>
</body>
</html>
