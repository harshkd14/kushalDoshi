    <section class="page-header">
        <h1>ILLUSTRATIONS</h1>
        <p>Creative Graphics & Visual Design</p>
    </section>
    <section class="grid" id="portfolio-grid"></section>
    <footer><p>© KUSHAL DOSHI - MEMORY WHEEL</p></footer>
    <script>
        const projects = [
            {image:"https://images.unsplash.com/photo-1561070791-2526d30994b5",title:"Abstract Art",category:"Abstract",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d",title:"Graphic Design",category:"Design",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1541701494587-cb58502866ab",title:"Digital Art",category:"Digital",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1549887534-1541e9326642",title:"Creative Concept",category:"Concept",orientation:"landscape"},
            {image:"https://images.unsplash.com/photo-1618005198919-d3d4b5a92ead",title:"Poster Design",category:"Poster",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1626785774573-4b799315345d",title:"Typography Art",category:"Typography",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1567095761054-7a02e69e5c43",title:"Visual Identity",category:"Branding",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1509395176047-4a66953fd231",title:"Art Direction",category:"Direction",orientation:"portrait"},
            {image:"https://images.unsplash.com/photo-1596548438137-d51ea5c83ca5",title:"Icon Design",category:"Icons",orientation:"square"},
            {image:"https://images.unsplash.com/photo-1634926878768-2a5b3c42f139",title:"Logo Design",category:"Logo",orientation:"square"},
            {image:"https://images.unsplash.com/photo-1626785774625-ddcddc3445e9",title:"Color Study",category:"Study",orientation:"square"},
        ];
        const grid=document.getElementById('portfolio-grid');
        projects.forEach((project,index)=>{
            const card=document.createElement('div');
            card.className=`card ${project.orientation}`;
            card.style.transitionDelay=`${(index%4)*0.1}s`;
            card.innerHTML=`<img src="${project.image}" alt="${project.title}" loading="lazy"><div class="overlay"><h3>${project.title}</h3><p>— view —</p></div>`;
            grid.appendChild(card);
        });
        const observer=new IntersectionObserver((entries)=>{entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add('visible');observer.unobserve(entry.target);}});},{threshold:0.1,rootMargin:'0px'});
        document.querySelectorAll('.card').forEach(card=>observer.observe(card));
        // Mobile menu
        const hamburger=document.querySelector('.hamburger');
        const navLinks=document.querySelector('.nav-links');
        if(hamburger){hamburger.addEventListener('click',()=>{hamburger.classList.toggle('active');navLinks.classList.toggle('active');});document.querySelectorAll('.nav-links a').forEach(link=>{link.addEventListener('click',()=>{hamburger.classList.remove('active');navLinks.classList.remove('active');});});}
    </script>
</body>
